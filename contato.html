    <body>

        <h1>Mande uma mensagem</h1>

        <form>
            <ul>
                <li>
                    <label for="nomePessoa">Nome</label>
                    <input type="text" name="nomePessoa" id="nomePessoa" required>
                </li>
            </br>
                <li>
                    <label for="emailPessoa">E-mail</label>
                    <input type="text" name="emailPessoa" id="emailPessoa" required>
                </li>
            </br>
                 <li>
                    <label for="telPessoa">Telefone</label>
                    <input type="text" name="telPessoa" id="telPessoa" required> (99) 99999-9999
                </li>
            </br>
                <li>
                    Assunto
                    <Select name="assunto">
                        <option>-- Selecione --</option>
                        <option>Reclamação</option>
                        <option>Sugestão</option>
                    </Select>
                </li>
            </br>
                <li>
                    <label for="msg">Mensagem</label> </br>
                    <textarea id="msg"></textarea>
                </li>
            </br>
                <li>
                    <fieldset>
                        <legend>Opções de resposta</legend>
                        <label for="choiceEmail">E-mail</label>
                        <input type="checkbox" name="choiceEmail" id="choiceEmail">
                        <label for="choiceTel">Telefone</label>
                        <input type="checkbox" name="choiceTel" id="choiceTel">
                    </fieldset>
                </li>
            </br>
                <li>
                    <input type="button" value="Enviar" class="buttonevent">
                </li>
            </ul>
        
        </form>

    </body>
